<div class="container">
    <div class="tasks">
        <div class="head d-flex justify-content-between align-items-center">
            <h3 class="mb-0">{{selectedUser().Name}}</h3>
            <button class="btn btn-success" (click)="togglePopup()">Add Task</button>
        </div>
        <div class="body">
            @for(task of getTasks ;track task.id){
                <app-task class="w-100" [currentTask]="task"></app-task>
            }@empty {
                <h3>There Is No Task/s For This Mentor</h3>
            }
        </div>
    </div>

</div>

@if(ispopUp){
    <app-new-task [selectedUserId]="selectedUser().id" (isPopUp)="togglePopup()"></app-new-task>
}
