<app-header></app-header>
<div class="container pt-5">
        <div class="row">
            <div class="col-lg-3">
                <div class="item">
                    @for(user of users; track user.id){
                        <app-users [user]="user" [isSelectedUserTrue]="user.id===selectedUser?.id" (click)="updateSelectedUser(user)"></app-users>
                    }
                </div>
            </div>
            <div class="col-lg-9">
                <div class="item">
                    @if(selectedUser){
                        <app-tasks [selectedUser]="selectedUser"></app-tasks>
                    }@else {
                        <h3 class="w-100 bg-black p-2 px-4 text-white rounded-3">Please Select Mentor</h3>
                    }
                </div>
            </div>
        </div>
</div>
